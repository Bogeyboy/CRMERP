<!--begin::Modal content CREATE-->
<div class="modal-content">
  <!--begin::Modal header-->
  <div class="modal-header" id="kt_modal_add_user_header">
    <!--begin::Modal title-->
    <h2 class="fw-bolder">Editar Producto en Almacén</h2>
    <!--end::Modal title-->
    <!--begin::Close-->
    <div class="btn btn-icon btn-sm btn-active-icon-primary" (click)="modal.dismiss()">
      <span class="svg-icon svg-icon-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect opacity="0.5" x="6" y="17.3137" width="16" height="2" rx="1" transform="rotate(-45 6 17.3137)" fill="currentColor" />
          <rect x="7.41422" y="6" width="16" height="2" rx="1" transform="rotate(45 7.41422 6)" fill="currentColor" />
        </svg>
      </span>
    </div>
    <!--end::Close-->
  </div>
  <!--end::Modal header-->
  
  <!--begin::Modal body-->
  <div class="modal-body scroll-y mx-5 my-7">
    <!--begin::Form-->
    <form class="form" action="#">
      <!--begin::Scroll-->
      <div class="d-flex flex-column scroll-y me-n7 pe-7" id="kt_modal_add_user_scroll">
        <!--begin::Input group-->
        <div class="fv-row row mb-7">
          <!-- SELECCIONABLE DE UNIDAD -->
          <div class="col-4">
            <label class="required form-label">Unidad</label>
            <select class="form-select mb-2" [(ngModel)]="unit_warehouse" name="unit_warehouse">
              <option value="">Seleccione una unidad</option>
              @for (UNIT of UNITS; track UNIT) {
                <option [value]="UNIT.id">{{ UNIT.name }}</option>
              }
            </select>
            <div class="text-muted fs-7">Defina unidad.</div>
          </div>
          
          <!-- SELECCIONABLE DE ALMACÉN -->
          <div class="col-4">
            <label class="required form-label">Almacen</label>
            <select class="form-select mb-2" [(ngModel)]="almacen_warehouse" name="almacen_warehouse">
              <option value="">Seleccione un almacén</option>
              @for (WAREHOUSE of WAREHOUSES; track WAREHOUSE) {
                <option [value]="WAREHOUSE.id">{{ WAREHOUSE.name }}</option>
              }
            </select>
            <div class="text-muted fs-7">Seleccione Almacén.</div>
          </div>
          
          <!-- SELECCIONABLE DE CANTIDAD -->
          <div class="col-3">
            <label class="required form-label">Cantidad</label>
            <input type="number" [(ngModel)]="quantity_warehouse" name="quantity_warehouse" class="form-control mb-2" placeholder="En estantería." />
            <div class="text-muted fs-7">Introduce la cantidad de producto.</div>
          </div>
        </div>
      </div>
      <!--end::Scroll-->

      <!--begin::Actions-->
      <div class="text-center pt-15">
        <button type="reset" class="btn btn-light me-3" (click)="modal.dismiss()">Cerrar</button>
        <button type="button" (click)="store()" class="btn btn-primary">
          <span class="indicator-label">Editar</span>
          @if (isLoading | async) {
            <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
          }
        </button>
      </div>
      <!--end::Actions-->
    </form>
    <!--end::Form-->
  </div>
  <!--end::Modal body-->
</div>
<!--end::Modal content CREATE-->
