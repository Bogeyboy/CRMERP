<!-- edit-roles.component.html - VERSIÓN CORREGIDA -->
<!--begin::Modal content CREATE-->
<div class="modal-content">
  <!--begin::Modal header-->
  <div class="modal-header" id="kt_modal_add_user_header">
    <h2 class="fw-bolder">Editar Rol: {{ ROL_SELECTED.name }}</h2>
    <div class="btn btn-icon btn-sm btn-active-icon-primary" (click)="modal.dismiss()">
      <span class="svg-icon svg-icon-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect opacity="0.5" x="6" y="17.3137" width="16" height="2" rx="1" transform="rotate(-45 6 17.3137)" fill="currentColor" />
          <rect x="7.41422" y="6" width="16" height="2" rx="1" transform="rotate(45 7.41422 6)" fill="currentColor" />
        </svg>
      </span>
    </div>
  </div>

  <!--begin::Modal body-->
  <div class="modal-body scroll-y mx-5 my-7">
    <form id="kt_modal_add_user_form" class="form" action="#">
      <div class="d-flex flex-column scroll-y me-n7 pe-7">

        <!-- Nombre del rol -->
        <div class="fv-row mb-7">
          <label class="required fw-bold fs-6 mb-2">Nombre del rol:</label>
          <input type="text" name="name" class="form-control form-control-solid mb-3 mb-lg-0"
                 placeholder="Nombre del rol" [(ngModel)]="name" />
        </div>

        <!-- Permisos -->
        <div class="fv-row mb-7">
          <label class="required fw-bold fs-6 mb-2">Selecciona los permisos</label>

          <div class="table-responsive w-100">
            <table class="table table-head-custom table-vertical-center">
              <thead>
                <tr class="text-left">
                  <th>Categoría</th>
                  <th>Permisos</th>
                 </tr>
              </thead>
              <tbody>
                @for (item of groupedPermissions | keyvalue; track item.key) {
                  <tr>
                    <td class="fw-bold">{{ item.key }}</td>
                    <td>
                      <div class="row">
                        @for (permiso of item.value; track permiso.name) {
                          <div class="col-md-4">
                            <div class="form-check form-check-sm form-check-custom form-check-solid py-1">
                              <input type="checkbox"
                                class="form-check-input"
                                [checked]="permissions.includes(permiso.name)"
                                (click)="addPermission(permiso.name)">
                              <label class="form-check-label">{{ permiso.name }}</label>
                            </div>
                          </div>
                        }
                      </div>
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>

        <!-- Botones de acción -->
        <div class="text-center pt-15">
          <button type="reset" class="btn btn-light me-3" (click)="modal.dismiss()">Cerrar</button>
          <button type="button" (click)="store()" class="btn btn-primary">
            <span class="indicator-label">Editar</span>
            @if (isLoading$ | async) {
              <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
            }
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
